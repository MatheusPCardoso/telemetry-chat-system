services:
  mongodb:
    image: mongo:7
    container_name: chatbot-mongodb
    command: ["/usr/local/bin/init-replica-set.sh"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-replica-set.sh:/usr/local/bin/init-replica-set.sh
    environment:
      MONGO_INITDB_DATABASE: admin
    networks:
      - chatbot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u chatbot -p chatbot123 --eval 'db.runCommand({ ping: 1 })'"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    networks:
      - chatbot-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mongodb://chatbot:chatbot123@mongodb:27017/chatbot?authSource=admin&replicaSet=rs0
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - chatbot-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatbot-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_WS_URL=ws://localhost:3000
    networks:
      - chatbot-network
    restart: unless-stopped

networks:
  chatbot-network:
    driver: bridge

volumes:
  mongodb_data:
